name: sweep-stale-claims
# Deletes claims/*.json whose expires_at is in the past. Runs every 30 min
# so a volunteer who crashed mid-transcription doesn't block a section.

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Sweep
        run: |
          python - <<'PY'
          import json, os, sys
          from datetime import datetime, timezone
          from pathlib import Path
          claims = Path("claims")
          if not claims.exists(): print("no claims/"); sys.exit(0)
          now = datetime.now(timezone.utc)
          removed = []
          for p in sorted(claims.glob("*.json")):
              try:
                  d = json.loads(p.read_text())
                  exp = datetime.fromisoformat(d["expires_at"].replace("Z","+00:00"))
                  if exp < now:
                      p.unlink()
                      removed.append(p.name)
              except Exception as e:
                  print(f"{p}: {e} — leaving in place")
          Path("/tmp/removed.txt").write_text("\n".join(removed))
          print(f"swept {len(removed)} stale claim(s)")
          PY
      - name: Commit + push
        run: |
          # grep -c counts non-empty lines (wc -l misses files without a
          # trailing newline, which is why earlier sweeps logged "remove 0").
          cnt=$(grep -c . /tmp/removed.txt 2>/dev/null || echo 0)
          if [ -z "$(git status --porcelain)" ]; then
            echo "nothing to commit"; exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A claims/
          git commit -m "sweep: remove $cnt stale claim(s)"
          git push
