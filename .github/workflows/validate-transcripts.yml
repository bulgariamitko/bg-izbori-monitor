name: validate-transcripts
# Validate transcript PRs and auto-merge good ones.
# A "good" PR touches ONLY files under transcripts/, each file matches
# transcripts/<SIK>_tour<N>.json, passes the schema, and does not overwrite
# an existing file in main.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths: ["transcripts/**"]
  # also trigger on direct pushes so a maintainer-push is validated
  push:
    branches: [main]
    paths: ["transcripts/**"]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2

      - name: Checkout base for diff
        if: github.event_name == 'pull_request_target'
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}:base
          git diff --name-only --diff-filter=AM base...HEAD > /tmp/changed.txt
          cat /tmp/changed.txt

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install jsonschema==4.23

      - name: Validate transcript files
        run: |
          python - <<'PY'
          import json, os, sys, re
          from pathlib import Path
          from jsonschema import validate, ValidationError
          SCHEMA = {
            "type":"object",
            "required":["schema","sik","slug","tour","video_url","segments","full_text","whisper"],
            "properties":{
              "schema":{"const":"bg-izbori-transcript/1"},
              "sik":{"type":"string","pattern":"^\\d{9}$"},
              "slug":{"type":"string","pattern":"^le\\d{8}$"},
              "tour":{"type":"integer","minimum":1,"maximum":2},
              "video_url":{"type":"string","pattern":"^https://archive\\.evideo\\.bg/"},
              "video_type":{"type":"string","enum":["device","live"]},
              "duration_sec":{"type":"number"},
              "whisper":{"type":"object","required":["model","language"],
                         "properties":{"model":{"type":"string"},"language":{"const":"bg"}}},
              "segments":{"type":"array","items":{"type":"object",
                         "required":["start","end","text"]}},
              "full_text":{"type":"string"},
              "contributed_by":{"type":"string"},
              "transcribed_at":{"type":"string"}
            }
          }
          base = Path(".")
          is_pr = os.environ.get("GITHUB_EVENT_NAME") == "pull_request_target"
          if is_pr:
              changed = Path("/tmp/changed.txt").read_text().splitlines()
          else:
              changed = [str(p) for p in base.glob("transcripts/*.json")]
          # Only transcripts/ files may be touched in a contributor PR.
          bad = [c for c in changed if c and not c.startswith("transcripts/")]
          if bad:
              print("::error::PR touches non-transcript files:", bad); sys.exit(1)
          name_re = re.compile(r"^transcripts/(\d{9})_tour[12]\.json$")
          errors = 0
          for c in changed:
              if not c: continue
              m = name_re.match(c)
              if not m:
                  print(f"::error file={c}::bad filename"); errors += 1; continue
              sik = m.group(1)
              try:
                  data = json.loads(Path(c).read_text())
                  validate(data, SCHEMA)
                  if data["sik"] != sik:
                      print(f"::error file={c}::filename SIK ≠ payload SIK"); errors += 1
              except (ValidationError, json.JSONDecodeError) as e:
                  print(f"::error file={c}::{e}"); errors += 1
          if errors:
              sys.exit(1)
          print(f"✓ all {len(changed)} transcript files valid")
          PY

      - name: Enable auto-merge
        if: github.event_name == 'pull_request_target'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash "${{ github.event.pull_request.number }}"
