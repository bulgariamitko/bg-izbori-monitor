name: validate-contribution
# Validates volunteer PRs and auto-merges good ones.
# Accepts PRs that ONLY add files under transcripts/ or claims/ (and may
# delete a claim when uploading the matching transcript). No other files.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - "transcripts/**"
      - "claims/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2

      - name: Diff vs base
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}:base
          git diff --name-status base...HEAD > /tmp/changed.txt
          cat /tmp/changed.txt

      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install deps
        run: pip install jsonschema==4.23

      - name: Validate
        run: |
          python - <<'PY'
          import json, os, re, sys
          from pathlib import Path
          from jsonschema import validate, ValidationError

          TRANSCRIPT_SCHEMA = {
            "type":"object",
            "required":["schema","sik","slug","tour","video_url","segments","full_text","whisper"],
            "properties":{
              "schema":{"const":"bg-izbori-transcript/1"},
              "sik":{"type":"string","pattern":"^\\d{9}$"},
              "slug":{"type":"string","pattern":"^(le\\d{8}|pe\\d{6})$"},
              "tour":{"type":"integer","minimum":1,"maximum":2},
              "video_url":{"type":"string","pattern":"^https://archive\\.evideo\\.bg/"},
              "video_type":{"type":"string","enum":["device","live"]},
              "duration_sec":{"type":"number"},
              "whisper":{"type":"object","required":["model","language"],
                "properties":{"model":{"type":"string"},"language":{"const":"bg"}}},
              "segments":{"type":"array","items":{"type":"object","required":["start","end","text"]}},
              "full_text":{"type":"string"},
              "contributed_by":{"type":"string"},
              "transcribed_at":{"type":"string"},
              "risk_level":{"type":["string","null"]},
            },
          }
          CLAIM_SCHEMA = {
            "type":"object",
            "required":["schema","sik","tour","contributor","claimed_at","expires_at"],
            "properties":{
              "schema":{"const":"bg-izbori-claim/1"},
              "sik":{"type":"string","pattern":"^\\d{9}$"},
              "tour":{"type":"integer","minimum":1,"maximum":2},
              "contributor":{"type":"string"},
              "claimed_at":{"type":"string"},
              "expires_at":{"type":"string"},
            },
          }
          tr_re = re.compile(r"^transcripts/(\d{9})_tour[12]\.json$")
          cl_re = re.compile(r"^claims/(\d{9})_tour[12]\.json$")

          errors = 0
          changed = [l.strip() for l in Path("/tmp/changed.txt").read_text().splitlines() if l.strip()]
          for line in changed:
              status, _, path = line.partition("\t")
              if not path.startswith(("transcripts/","claims/")):
                  print(f"::error file={path}::PR may only touch transcripts/ or claims/ files")
                  errors += 1; continue
              if status == "D":
                  # only allow deleting a claim that corresponds to a transcript added in the same PR
                  if not cl_re.match(path):
                      print(f"::error file={path}::may only delete claims/<SIK>_tour<N>.json"); errors += 1
                  continue
              # A or M
              is_tr = bool(tr_re.match(path))
              is_cl = bool(cl_re.match(path))
              if not (is_tr or is_cl):
                  print(f"::error file={path}::bad filename"); errors += 1; continue
              try:
                  data = json.loads(Path(path).read_text())
                  validate(data, TRANSCRIPT_SCHEMA if is_tr else CLAIM_SCHEMA)
                  m = (tr_re if is_tr else cl_re).match(path)
                  if data["sik"] != m.group(1):
                      print(f"::error file={path}::filename SIK ≠ payload SIK")
                      errors += 1
              except (ValidationError, json.JSONDecodeError) as e:
                  print(f"::error file={path}::{e}"); errors += 1
          if errors: sys.exit(1)
          print(f"✓ all {len(changed)} files valid")
          PY

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash "${{ github.event.pull_request.number }}"
