name: publish-pages
# Rebuild dashboard.html and publish to GitHub Pages on every push to main
# that changes sections, transcripts, or findings.

on:
  push:
    branches: [main]
    paths:
      - "sections.json"
      - "transcripts/**"
      - "findings/**"
      - "dashboard.py"
      - "config.py"
      - "store.py"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Build dashboard
        run: |
          mkdir -p site
          python dashboard.py
          cp dashboard.html site/index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with: { path: site }
      - id: deployment
        uses: actions/deploy-pages@v4
